name: VistOS CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-server:latest

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-client:latest

  deploy-to-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Pull pre-built images and restart
        run: |
          cd /opt/vist
          # Prevent dubious ownership errors if the directory is owned by root
          git config --global --add safe.directory /opt/vist
          
          # Pull latest code just to get any docker-compose.yml changes
          git fetch origin main
          git reset --hard origin/main
          
          # Pull the pre-built images from GHCR
          docker compose pull
          
          # Restart containers with the new images (zero build time!)
          docker compose up -d
          
      - name: Health check
        run: |
          docker compose -f /opt/vist/docker-compose.yml ps
