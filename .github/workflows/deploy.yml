name: VistOS CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/vistos-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/vistos-client

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and push to GHCR
  # ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          # Tag with both :latest and the short SHA for rollback capability
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:latest
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # JOB 2: Deploy to production via SSH
  # Runs after images are successfully built and pushed.
  # Requires the following GitHub Secrets to be set:
  #   - PROD_HOST      → IP address of the server (e.g. 89.167.61.188)
  #   - PROD_USER      → SSH username (e.g. root)
  #   - PROD_SSH_KEY   → Private SSH key for the server
  # ────────────────────────────────────────────────────────────
  deploy-to-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            cd /opt/vist

            echo "→ Syncing latest compose file..."
            git fetch origin main
            git checkout origin/main -- docker-compose.yml

            echo "→ Logging in to GHCR..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "→ Pulling new images..."
            docker compose pull

            echo "→ Removing stale containers to avoid name conflicts..."
            docker rm -f vistos_client vistos_server || true

            echo "→ Restarting services with zero-downtime..."
            docker compose up -d --remove-orphans

            echo "→ Running pending Prisma migrations..."
            docker compose exec -T server npx prisma migrate deploy

            echo "→ Cleaning up old images..."
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Wait up to 30s for the server to respond
            for i in $(seq 1 15); do
              if curl -sf http://localhost:5000/ > /dev/null; then
                echo "✅ Server health check passed"
                exit 0
              fi
              echo "Waiting for server... ($i/15)"
              sleep 2
            done
            echo "❌ Health check failed"
            docker compose -f /opt/vist/docker-compose.yml logs --tail=50 server
            exit 1
