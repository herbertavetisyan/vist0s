name: VistOS CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  # ─── Job 1: Verify ────────────────────────────────────────────────────────
  verify:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install & generate Prisma (Server)
        working-directory: ./server
        run: |
          npm ci
          npx prisma generate

      - name: Build Client
        working-directory: ./client
        run: |
          npm ci
          npm run build

  # ─── Job 2: Build & Push Images ───────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ env.REPO }}/vistos-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ghcr.io/${{ env.REPO }}/vistos-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Production ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/vist

            # Log in to GHCR so we can pull private packages
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true

            # Pull latest images and restart
            docker compose pull server client
            docker compose up -d --no-build server client

            # Show running containers
            docker compose ps
