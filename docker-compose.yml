# Production docker-compose — pulls pre-built images from GHCR.
# For local development use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: vistos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: vistos_prod
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ${SERVER_IMAGE:-ghcr.io/herbertavetisyan/vistos-server:latest}
    container_name: vistos_server
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/vistos_prod?schema=public
      - PORT=5000
      - JWT_SECRET=supersecretvistospassword123!
    ports:
      - "5000:5000"
    restart: unless-stopped

  client:
    image: ${CLIENT_IMAGE:-ghcr.io/herbertavetisyan/vistos-client:latest}
    container_name: vistos_client
    depends_on:
      - server
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  postgres_data:
